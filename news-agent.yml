name: Daily News Agent

on:
  schedule:
    # Runs every day at 10:00 UTC
    - cron: '0 10 * * *'

  # Allows you to run it manually from the GitHub UI
  workflow_dispatch:

jobs:
  run-news-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Add any other secrets your app needs here
        run: |
          python main.py
